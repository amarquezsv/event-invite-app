# Frontend CI/CD Workflow — React + Vite → Azure Static Web Apps
# Triggers on push or pull_request targeting the main branch.

name: Frontend — Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository so the workflow can access the source code.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # Step 2: Build and deploy via Azure Static Web Apps.
      # The action invokes Oryx internally to run 'npm install' and 'npm run build'.
      # app_location    — folder containing package.json (relative to repo root).
      # output_location — build artifact folder relative to app_location. Vite is
      #                   configured (vite.config.js build.outDir) to write to 'build/'
      #                   so that it matches the folder Oryx expects for React projects.
      # app_build_command — explicitly pass the build command so Oryx does not need to
      #                     infer it; this also ensures output_location is honoured.
      # api_location is left empty because the API is hosted separately as an Azure Function.
      - name: Build and deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}   # Used by the action to comment on PRs.
          action: 'upload'
          app_location: 'frontend'
          output_location: 'build'
          api_location: ''                          # No API co-located with the static app.
          app_build_command: 'npm run build'        # Explicit build command passed to Oryx.

      # Step 3 (PR only): When a pull_request is closed the Static Web Apps staging
      # environment for that PR is automatically torn down.
      - name: Close Pull Request staging environment
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
          app_location: 'frontend'
