# Frontend CI/CD Workflow — React + Vite → Azure Static Web Apps
# Triggers on push or pull_request targeting the main branch.

name: Frontend — Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository so the workflow can access the source code.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # Step 2: Set up Node.js. Matches the version expected by the Vite + React project.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Step 3: Install all npm dependencies defined in frontend/package.json.
      - name: Install dependencies
        working-directory: frontend
        run: npm install

      # Step 4: Build the Vite project. Output lands in frontend/dist.
      - name: Build project
        working-directory: frontend
        run: npm run build

      # Step 5: Deploy the pre-built assets to the existing Azure Static Web App.
      # The API token is stored as a GitHub Secret (AZURE_STATIC_WEB_APPS_API_TOKEN).
      # skip_app_build: true — prevents the action from running Oryx internally, since
      #   we already built the app in the steps above. Without this flag, Oryx rebuilds
      #   the app and looks for a 'build' folder instead of 'dist', causing a failure.
      # app_location  — root of the frontend source (relative to repo root).
      # output_location — folder produced by our build step, relative to app_location.
      #   With skip_app_build, the action deploys frontend/dist directly.
      # api_location is left empty because the API is hosted separately as an Azure Function.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}   # Used by the action to comment on PRs.
          action: 'upload'
          app_location: 'frontend'
          output_location: 'dist'
          api_location: ''                          # No API co-located with the static app.
          skip_app_build: true                      # Use the dist/ folder built above; skip Oryx.

      # Step 6 (PR only): When a pull_request is closed the Static Web Apps staging
      # environment for that PR is automatically torn down.
      - name: Close Pull Request staging environment
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
          app_location: 'frontend'
